<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Themed Event Photo Booth</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-color: #1e1e24;
            --accent-color: #e94560;
            --text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }

        header { text-align: center; margin-bottom: 20px; }
        h1 { margin: 0; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-color); font-size: 2rem; }

        .booth-container {
            background: var(--card-color);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }

        .camera-box {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4/3;
        }

        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); } /* Applied dynamically */

        .overlay-ui {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .countdown {
            font-size: 7rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none;
        }

        .shot-indicator {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid var(--accent-color);
        }

        .flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none;
        }

        .controls {
            margin-top: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: var(--accent-color);
            color: white; border: none; padding: 16px 40px;
            font-size: 1.2rem; font-weight: bold; border-radius: 50px;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            -webkit-tap-highlight-color: transparent;
            width: 80%;
        }

        .btn:active:not(:disabled) { transform: scale(0.95); opacity: 0.9; }
        .btn:disabled { background-color: #555; box-shadow: none; cursor: not-allowed; }
        
        .switch-btn {
            background-color: #4a4a5a;
            box-shadow: none;
            font-size: 0.9rem;
            padding: 10px 20px;
        }

        .action-section {
            margin-top: 30px; text-align: center; width: 100%;
            max-width: 500px; display: none;
        }

        .preview-image {
            width: 100%; max-width: 280px; border-radius: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); margin-bottom: 20px;
        }

        .action-buttons {
            display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center;
        }

        .print-btn { background-color: #1e90ff; box-shadow: 0 4px 15px rgba(30,144,255,0.4); }
        .text-btn { background-color: #2ed573; box-shadow: 0 4px 15px rgba(46,213,115,0.4); }

        #hidden-canvas { display: none; }

        @media print {
            body { background: white; color: black; padding: 0; margin: 0; }
            header, .booth-container, .action-buttons, h3, p, .switch-btn { display: none !important; }
            .action-section { display: block !important; margin: 0; padding: 0; }
            .preview-image { width: 4in; height: 6in; box-shadow: none; border-radius: 0; margin: 0; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Themed Photo Booth</h1>
        <p>Cherry Blossom & Puerto Rico Dual Strips</p>
    </header>

    <div class="booth-container">
        <div class="camera-box">
            <video id="webcam" autoplay playsinline class="mirror"></video>
            <div class="overlay-ui">
                <div id="countdown" class="countdown">3</div>
                <div id="shot-counter" class="shot-indicator" style="display: none;">Ready</div>
            </div>
            <div id="flash-effect" class="flash"></div>
        </div>
        
        <div class="controls">
            <button id="start-btn" class="btn">🎬 Start Session</button>
            <button id="switch-btn" class="btn switch-btn">🔄 Switch Camera</button>
        </div>
    </div>

    <div id="action-section" class="action-section">
        <h3>Your Photo Sheet is Ready!</h3>
        <img id="final-preview" class="preview-image" src="" alt="Photo strip preview">
        
        <div class="action-buttons">
            <button id="print-btn" class="btn print-btn">🖨️ Print Sheet</button>
            <button id="text-btn" class="btn text-btn">📱 Text To Phone</button>
        </div>
    </div>

    <canvas id="hidden-canvas" width="1200" height="1800"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const startBtn = document.getElementById('start-btn');
        const switchBtn = document.getElementById('switch-btn');
        const countdownEl = document.getElementById('countdown');
        const shotCounterEl = document.getElementById('shot-counter');
        const flashEl = document.getElementById('flash-effect');
        const actionSection = document.getElementById('action-section');
        const finalPreview = document.getElementById('final-preview');
        const printBtn = document.getElementById('print-btn');
        const textBtn = document.getElementById('text-btn');
        const canvas = document.getElementById('hidden-canvas');
        const ctx = canvas.getContext('2d');

        let capturedFrames = [];
        let sessionActive = false;
        let videoDevices = [];
        let currentDeviceIndex = 0;
        let isMirrored = true;

        // Find all cameras plugged into the iPad
        async function getCameras() {
            try {
                await navigator.mediaDevices.getUserMedia({ video: true }); // Request initial permission
                const devices = await navigator.mediaDevices.enumerateDevices();
                videoDevices = devices.filter(device => device.kind === 'videoinput');
            } catch (err) {
                console.error("Error cataloging cameras", err);
            }
        }

        async function startWebcam() {
            if (videoDevices.length === 0) await getCameras();
            if (videoDevices.length === 0) {
                alert("No camera found.");
                return;
            }

            const currentDevice = videoDevices[currentDeviceIndex];
            
            // Turn off mirroring if using an external camera/DSLR capture card so text isn't backwards
            if (currentDevice.label.toLowerCase().includes('external') || currentDevice.label.toLowerCase().includes('video capture') || currentDeviceIndex > 1) {
                isMirrored = false;
                video.classList.remove('mirror');
            } else {
                isMirrored = true;
                video.classList.add('mirror');
            }

            const constraints = {
                video: {
                    deviceId: { exact: currentDevice.deviceId },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
            } catch (err) {
                // Fallback loop if exact match blocks
                navigator.mediaDevices.getUserMedia({ video: true }).then(s => video.srcObject = s);
            }
        }

        switchBtn.addEventListener('click', () => {
            if (videoDevices.length > 1) {
                currentDeviceIndex = (currentDeviceIndex + 1) % videoDevices.length;
                startWebcam();
            } else {
                alert("Only one camera source detected. Plug in your external camera/capture card to swap.");
            }
        });

        startBtn.addEventListener('click', async () => {
            if (sessionActive) return;
            sessionActive = true;
            startBtn.disabled = true;
            actionSection.style.display = 'none';
            capturedFrames = [];
            shotCounterEl.style.display = 'block';

            for (let i = 1; i <= 4; i++) {
                shotCounterEl.textContent = `Photo ${i} of 4`;
                await runCountdown(3);
                triggerFlash();
                captureFrame();
                await new Promise(resolve => setTimeout(resolve, 800));
            }

            shotCounterEl.style.display = 'none';
            buildFourBySixSheet();
            sessionActive = false;
            startBtn.disabled = false;
        });

        function runCountdown(seconds) {
            return new Promise((resolve) => {
                let current = seconds;
                countdownEl.textContent = current;
                countdownEl.style.display = 'block';
                const timer = setInterval(() => {
                    current--;
                    if (current > 0) { countdownEl.textContent = current; } 
                    else { clearInterval(timer); countdownEl.style.display = 'none'; resolve(); }
                }, 1000);
            });
        }

        function triggerFlash() {
            flashEl.style.opacity = '1';
            setTimeout(() => { flashEl.style.opacity = '0'; }, 150);
        }

        function captureFrame() {
            const tempCanvas = document.createElement('canvas');
            // Keep output high-res 4:3 framework
            tempCanvas.width = 960; tempCanvas.height = 720;
            const tempCtx = tempCanvas.getContext('2d');
            
            if (isMirrored) {
                tempCtx.translate(tempCanvas.width, 0);
                tempCtx.scale(-1, 1);
            }
            
            tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            capturedFrames.push(tempCanvas);
        }

        function buildFourBySixSheet() {
            ctx.fillStyle = "#121214";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const stripWidth = 560; const stripHeight = 1800;
            
            // --- STRIP 1: CHERRY BLOSSOM ---
            ctx.save();
            ctx.fillStyle = "#fff0f5"; ctx.fillRect(0, 0, stripWidth, stripHeight);
            ctx.strokeStyle = "#6d4c41"; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(0, 1800); ctx.quadraticCurveTo(150, 1700, 200, 1750); ctx.stroke();
            ctx.fillStyle = "#ffb7c5";
            ctx.beginPath(); ctx.arc(120, 1710, 15, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(180, 1730, 12, 0, Math.PI*2); ctx.fill();
            drawStripPhotos(20, "cherry");
            ctx.fillStyle = "#d81b60"; ctx.font = "italic bold 36px 'Georgia', serif"; ctx.textAlign = "center";
            ctx.fillText("Cherry Blossom", stripWidth / 2, 1650);
            ctx.restore();

            // --- STRIP 2: PUERTO RICO ---
            ctx.save();
            const leftX2 = 640;
            ctx.fillStyle = "#e57373"; ctx.fillRect(leftX2, 0, stripWidth, stripHeight);
            ctx.fillStyle = "#4fc3f7"; ctx.fillRect(leftX2, 1580, stripWidth, 10);
            drawStripPhotos(leftX2, "pr");
            ctx.fillStyle = "#ffffff"; ctx.font = "black 42px 'Impact', sans-serif"; ctx.textAlign = "center";
            ctx.fillText("¡PUERTO RICO!", leftX2 + (stripWidth / 2), 1660);
            ctx.restore();

            const sheetUrl = canvas.toDataURL('image/jpeg', 0.95);
            finalPreview.src = sheetUrl;
            actionSection.style.display = 'block';
        }

        function drawStripPhotos(stripLeftX, theme) {
            const imgWidth = 480; const imgHeight = 360; const topMargin = 60; const gap = 35;
            capturedFrames.forEach((frame, index) => {
                const targetY = topMargin + index * (imgHeight + gap);
                const targetX = stripLeftX + 40;
                ctx.save();
                if (theme === "cherry") {
                    ctx.filter = "contrast(102%) brightness(105%) saturate(105%)";
                    ctx.fillStyle = "#ffffff"; ctx.fillRect(targetX - 12, targetY - 12, imgWidth + 24, imgHeight + 24);
                } else if (theme === "pr") {
                    ctx.filter = "contrast(115%) saturate(130%) brightness(102%)";
                    ctx.fillStyle = "#fff9c4"; ctx.fillRect(targetX - 12, targetY - 12, imgWidth + 24, imgHeight + 24);
                }
                ctx.drawImage(frame, targetX, targetY, imgWidth, imgHeight);
                ctx.restore();
            });
        }

        printBtn.addEventListener('click', () => { window.print(); });

        textBtn.addEventListener('click', () => {
            const phoneNumber = prompt("Enter phone number to receive image link:");
            if (!phoneNumber) return;
            const cleanNumber = phoneNumber.replace(/\D/g, '');
            const placeholderImageUrl = "https://yourboothsite.com/view-photo-strip"; 
            const textMessage = encodeURIComponent(`Here is your photo booth memory strip: ${placeholderImageUrl}`);
            window.location.href = `sms:${cleanNumber};&body=${textMessage}`;
        });

        window.addEventListener('load', startWebcam);
    </script>
</body>
</html>
